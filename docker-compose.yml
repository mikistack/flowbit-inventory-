services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - '55432:5432'

  redis:
    image: redis:7
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'

  server:
    build:
      context: ./server
    depends_on:
      - db
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      APP_TZ: Africa/Addis_Ababa
      CORS_ORIGIN: http://localhost:8080,http://localhost:5173,https://*.trycloudflare.com
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: inventory_db
      DB_USER: inventory_user
      DB_PASSWORD: inventory_pass
      REDIS_URL: redis://redis:6379
      # IMPORTANT: Replace these with strong random secrets before any live deployment.
      # Generate with: node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
      JWT_SECRET: super-secret
      JWT_REFRESH_SECRET: refresh-secret
      SEED_SAMPLE_DATA: 'true'
      ADMIN_DEFAULT_PASSWORD: Admin@123
      ADMIN_FORCE_PASSWORD_RESET: 'true'
    ports:
      - '4000:4000'

  web:
    build:
      context: ./web
    depends_on:
      - server
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_API_TARGET: http://server:4000
    ports:
      - '8080:5173'

volumes:
  pg-data:
